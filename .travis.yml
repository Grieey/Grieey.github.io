language: node_js
node_js: v10.16.0

matrix:
  include:
    - dist: bionic
    - dist: xenial

# Travis-CI Caching
cache:
  directories:
    - node_modules

# S: Build Lifecycle
install:
  - npm install 
  # - npm install hexo-renderer-jade hexo-renderer-stylus --save

before_script:
 # - npm install -g gulp


script:
  - hexo clean  
  - hexo g -d


after_script:
  - cd ./public
  - git init
  - git config user.name "Grieey"
  - git config user.email "yangqing433520@163.com"
  - git add .
  - git commit -m "Update docs"
  - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master
# E: Build LifeCycl

branches:
  only:
    - source
env:
 global:
   - GH_REF: github.com/Grieey/Grieey.github.io.git
